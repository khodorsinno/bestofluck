<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A heartfelt good luck message - professionally designed, emotionally resonant landing page"
    />
    <meta name="theme-color" content="#0a0a14" />

    <title>Good Luck - A Heartfelt Message</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="style.css" />

    <!-- Preconnect to fonts for better performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>

  <body>
    <!-- ===== ANIMATED BACKGROUND SECTION ===== -->
    <div class="background-animation">
      <!-- Animated gradient -->
      <div class="gradient-bg"></div>

      <!-- Floating orbs for depth -->
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>

      <!-- Floating particles -->
      <div class="particles"></div>
    </div>

    <!-- ===== MAIN CONTAINER ===== -->
    <main class="container">
      <!-- Content wrapper with all main content -->
      <div class="content-wrapper">
        <!-- ===== DECORATIVE HEARTS ===== -->
        <div class="hearts-decoration heart-1">❤️</div>
        <div class="hearts-decoration heart-2">💜</div>
        <div class="hearts-decoration heart-3">❤️</div>

        <!-- ===== MESSAGE CARD (Glassmorphism Design) ===== -->
        <article class="message-card">
          <!-- Main English message -->
          <h1 class="main-message">
            Wish you the best of luck, proud as always ❤️
          </h1>

          <!-- Japanese message (Sub-heading) -->
          <h2 class="sub-message">
            幸運を祈っています。いつものように誇りに思います。🤞
          </h2>
        </article>

        <!-- ===== GIF SECTION ===== -->
        <section class="gif-section">
          <div class="gif-container">
            <div class="gif-placeholder">
              <div class="gif-content"></div>
              <!-- 
              VIDEO TAG:
              Playing flowers.mp4 video
            -->
              <video class="gif-img" controls autoplay muted loop>
                <source src="flowers.mp4" type="video/mp4" />
                Your browser does not support the video tag.
              </video>
            </div>
          </div>
        </section>
      </div>
    </main>

    <!-- ===== SCRIPTS ===== -->
    <script src="script.js"></script>
  </body>
</html>
